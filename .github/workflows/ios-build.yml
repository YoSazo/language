name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/JapaneseCoach
        run: xcodegen generate

      - name: Build unsigned app
        working-directory: ios/JapaneseCoach
        run: |
          set -euo pipefail
          xcodebuild \
            -project JapaneseCoach.xcodeproj \
            -scheme JapaneseCoach \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

          APP_PATH=$(find build -type d -path '*Release-iphoneos/*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app"
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry JapaneseCoach.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapaneseCoach-ipa
          path: |
            ios/JapaneseCoach/JapaneseCoach.ipa
            altstore/source.template.json

      - name: Attach IPA to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/JapaneseCoach/JapaneseCoach.ipa

