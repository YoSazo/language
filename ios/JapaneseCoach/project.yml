name: JapaneseCoach
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_NAME: JapaneseCoach
    PRODUCT_BUNDLE_IDENTIFIER: com.samat.japanesecoach
    MARKETING_VERSION: 0.1.1
    CURRENT_PROJECT_VERSION: 2
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  JapaneseCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JapaneseCoach
        excludes:
          - Info.plist
          - Assets.xcassets
          - LaunchScreen.storyboard
          - Preview Content
    resources:
      - path: JapaneseCoach/Assets.xcassets
      - path: JapaneseCoach/LaunchScreen.storyboard
    info:
      path: JapaneseCoach/Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: JapaneseCoach/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  JapaneseCoach:
    build:
      targets:
        JapaneseCoach: all
    run:
      config: Debug
    archive:
      config: Release
